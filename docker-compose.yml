services:
  n8n:
    image: n8nio/n8n
    container_name: n8n-main
    ports:
      - "5678:5678"

    environment:
      - N8N_HOST=icing-crystal-agreement.ngrok-free.dev
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://icing-crystal-agreement.ngrok-free.dev/
      - N8N_SECURE_COOKIE=false

    volumes:
      - ./n8n_data:/home/node/.n8n